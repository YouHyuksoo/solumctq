# @file .github/workflows/deploy.yml
# @description GitHub Actions — Windows self-hosted runner 배포 파이프라인
#
# 초보자 가이드:
# 1. master 브랜치에 push 시 자동 실행
# 2. DEPLOY_DIR_CTQ 환경변수 경로로 동기화 배포
# 3. PM2로 무중단 재시작
#
# 사전 준비:
# - Windows 서버에 GitHub self-hosted runner 설치
# - GitHub > Settings > Actions > Runners 에서 LogServer 라벨 추가
# - Node.js, PM2 설치
# - 서버에 DEPLOY_DIR_CTQ 시스템 환경변수 설정 (관리자 PowerShell):
#     [System.Environment]::SetEnvironmentVariable('DEPLOY_DIR_CTQ', 'C:\Project\solumctq', 'Machine')
# - runner 서비스 재시작 (환경변수 반영)
# - {DEPLOY_DIR_CTQ}\.env.local 파일 수동 배치 (최초 1회, Oracle 접속 정보)

name: Deploy CTQ Monitoring

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, LogServer]

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

    steps:
      - name: Verify DEPLOY_DIR_CTQ
        run: |
          if (-not $env:DEPLOY_DIR_CTQ) {
            Write-Host "##[error]DEPLOY_DIR_CTQ is not set! Run on the server:"
            Write-Host "  [System.Environment]::SetEnvironmentVariable('DEPLOY_DIR_CTQ', 'C:\Project\solumctq', 'Machine')"
            exit 1
          }
          Write-Host "[CTQ] Deploy target: $env:DEPLOY_DIR_CTQ"

      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Stop PM2 before sync
        run: |
          if (Test-Path "$env:DEPLOY_DIR_CTQ\ecosystem.config.cjs") {
            try {
              Set-Location $env:DEPLOY_DIR_CTQ
              pm2 stop ecosystem.config.cjs 2>$null
            } catch {}
          } else {
            Write-Host "First deploy, skipping PM2 stop"
          }

      - name: Sync to deploy directory
        run: |
          $src = "${{ github.workspace }}"
          $dst = $env:DEPLOY_DIR_CTQ

          if (!(Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }

          robocopy $src $dst /MIR /NFL /NDL /NJH /NJS /NC /NS `
            /XF ".env" ".env.local" ".env.production" `
            /XD ".git" "logs"

          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Create logs directory
        run: |
          $logsDir = "$env:DEPLOY_DIR_CTQ\logs"
          if (!(Test-Path $logsDir)) { New-Item -ItemType Directory -Path $logsDir -Force }

      - name: Restart services with PM2
        run: |
          Set-Location $env:DEPLOY_DIR_CTQ
          $ErrorActionPreference = "SilentlyContinue"
          pm2 describe ctq-web 2>$null | Out-Null
          $running = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = "Stop"
          if ($running) {
            Write-Host "Reloading existing PM2 process..."
            pm2 reload ecosystem.config.cjs --update-env
          } else {
            Write-Host "Starting PM2 process for the first time..."
            pm2 start ecosystem.config.cjs
          }
          pm2 save

      - name: Health check
        run: |
          Start-Sleep -Seconds 5
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3000" -UseBasicParsing -TimeoutSec 10
            Write-Host "[CTQ] App OK (status: $($r.StatusCode))"
          } catch {
            Write-Host "[CTQ] App not ready yet — may need a few more seconds"
          }

      - name: Show PM2 status
        if: always()
        run: pm2 status
